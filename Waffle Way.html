<!DOCTYPE html>
<html>
    <head>
<link rel="icon" type="image/x-icon" href="https://images.vexels.com/content/127458/preview/coffee-round-service-icon-b09759.png">
    <title>Waffle Way</title>
      <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    body{
        text-align: center;
    }
    </style>
    </head>
    <body>
        <br>
        <br>
        <h1>
            Waffle Way
        </h1>
        <img style="width: 300px;" src="https://static.vecteezy.com/system/resources/previews/024/106/555/non_2x/chocolate-belgian-waffles-with-chocolate-topping-on-transparent-background-png.png">
        <p>
        Consists of a Waffle with milk and favored toppings!
        </p>
        <h2 id="Order">
        $3.99
        </h2>
        <p>Total: <span id="result"></span></p>
        <input type="number" placeholder="Quantity" id="Quantity"></input><br><br>
        <button onclick="multiply()" class="btn btn-primary">Check Price</button>
        <br><br>
        <a href="file:///C:/Users/vsmat/Desktop/Coding%20by%20Achyuthan/Cafe%20Bliss/Payment%20Method.html" class="btn btn-primary">Order</a>
    </body>
    <script>
        function multiply() {
    const Quantity = parseFloat(document.getElementById("Quantity").value);
    const price = parseFloat(document.getElementById("Order").textContent.replace('$',''));
    const product = (Quantity * price).toFixed(2);
    document.getElementById("result").textContent = `$${product}`;
        }
    </script>
</html>
